<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fourth Page - Result</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <style>

        .fourth-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px 70px;
            position: relative; /* 홈 버튼의 기준점 */
            width: 100%;
            box-sizing: border-box;
            background-color: transparent;
        }

        .home-btn-wrapper {
            --home-btn-size: clamp(46px, 7vw, 70px);
            --home-btn-move-up: clamp(-34px, -3.5vw, -22px);
            --home-btn-move-left: clamp(-16px, -1.7vw, -10px);
            position: fixed;
            top: clamp(16px, 4vw, 50px);
            left: clamp(12px, 2.5vw, 32px);
            transform: translate(var(--home-btn-move-left), var(--home-btn-move-up));
            z-index: 999; /* 화면 최상단으로 강제 고정 */
        }

        .fourth-page .home-btn-wrapper a img.home-btn {
            width: var(--home-btn-size) !important;      
            height: auto !important;
            animation: none !important;
            opacity: 1 !important;  
            display: block !important;
        }

        .title-img {
            width: 800px; /* 너무 크지도 작지도 않게 적당히 강조되는 크기 */
            height: auto;
            margin-bottom: 40px;
        }

        .result-title {
            margin-bottom: 40px;
            text-align: center;
            font-family: 'bitcount', sans-serif;
            font-size: 24px;
            line-height: 1.6;
            color: #111;
        }

        .result-logo {
            display: block;
            color: #FF7EB4;
            -webkit-text-fill-color: #FF7EB4;
            font-family: 'bitcount', sans-serif;
            font-size: 31px;
            line-height: 1.2;
        }

        /* 폴라로이드 프레임 스타일 */
        .polaroid-frame {
            background-color: white;
            padding: 20px 20px 40px 20px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative; 
            margin-top: 10px;
        }

        .captured-photo {
            width: 450px;  /* 원래 600px에서 450px로 축소하여 균형을 맞춤 */
            height: 300px; /* 가로 세로 비율 유지 */
            background-color: #d9d9d9;
            object-fit: cover;
            display: block;
        }

        .polaroid-actions {
            position: absolute;
            top: -30px; 
            right: 0;
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 995;
        }

        #download-link,
        #share-button {
            width: 20px; 
            height: 20px;
            display: block;
        }

        #share-button {
            border: none;
            padding: 0;
            background: transparent;
        }

        .fourth-page .polaroid-frame .polaroid-actions img {
            width: 100% !important;
            height: auto !important;
            animation: none !important;  
            opacity: 1 !important;       
            cursor: pointer !important;
        }

        .share-message {
            position: fixed;
            left: 50%;
            bottom: 34px;
            transform: translateX(-50%);
            max-width: min(420px, calc(100vw - 40px));
            padding: 14px 18px;
            border-radius: 8px;
            background-color: white;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.16);
            color: #111;
            font-family: 'bitcount', sans-serif;
            font-size: 13px;
            line-height: 1.45;
            text-align: center;
            z-index: 1000;
        }

        .share-message.hidden {
            display: none;
        }

        /* 폴라로이드 하단 날짜 텍스트 스타일 */
        .date-text {
            margin-top: 25px;
            font-size: 20px; /* 사진 크기에 맞춰 폰트 사이즈도 살짝 조절 */
            color: #333;
            letter-spacing: 1px;
            font-family: 'bitcount', sans-serif;
        }
    </style>
</head>
<body class="fourth-page-body">

    <div class="scroll-container fourth-page">
        
        <div class="home-btn-wrapper">
            <a href="index.html">
                <img src="homebutton.png" alt="Home" class="home-btn">
            </a>
        </div>

        <div class="result-title">
            <div>Here's your photo!</div>
            <div class="result-logo accent-bitcount">0awareness</div>
        </div>

        <div class="polaroid-frame">
            
            <div class="polaroid-actions">
                <button id="share-button" type="button" aria-label="Share photo">
                    <img src="export.png" alt="Share" class="share-btn">
                </button>

                <a id="download-link" download="awareness_memory.png">
                    <img src="download.png" alt="Download" class="download-btn">
                </a>
            </div>

            <img id="result-image" class="captured-photo" alt="No photo captured">

            <div id="today-date" class="date-text">MM.DD.YYYY</div>
        </div>

    </div>

    <div id="share-message" class="share-message hidden" role="status" aria-live="polite"></div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            /* ========================================================
               [기능 1] 3번째 페이지에서 몰래 찍은 사진 불러오기 & 다운로드 연결
            ======================================================== */
            const savedPhoto = sessionStorage.getItem('myCapturedPhoto');
            const imageElement = document.getElementById('result-image');
            const downloadLink = document.getElementById('download-link');
            const shareButton = document.getElementById('share-button');
            const shareMessage = document.getElementById('share-message');

            if (savedPhoto) {
                imageElement.src = savedPhoto;
                downloadLink.href = savedPhoto;
            } else {
                imageElement.alt = "사진을 찾을 수 없습니다. 카메라 권한을 확인해주세요!";
                if(downloadLink) downloadLink.style.display = 'none'; 
                if(shareButton) shareButton.style.display = 'none'; 
            }

            /* ========================================================
               [기능 2] 오늘 날짜 자동으로 구해서 넣기 (MM.DD.YYYY 형식)
            ======================================================== */
            const now = new Date();
            
            const month = String(now.getMonth() + 1).padStart(2, '0'); 
            const date = String(now.getDate()).padStart(2, '0');
            const year = now.getFullYear(); 

            const formattedDate = `${month}.${date}.${year}`;

            document.getElementById('today-date').innerText = formattedDate;

            function showShareMessage(message) {
                shareMessage.innerText = message;
                shareMessage.classList.remove('hidden');

                setTimeout(() => {
                    shareMessage.classList.add('hidden');
                }, 4200);
            }

            function dataUrlToFile(dataUrl, fileName) {
                const parts = dataUrl.split(',');
                const mimeMatch = parts[0].match(/:(.*?);/);
                const mimeType = mimeMatch ? mimeMatch[1] : 'image/png';
                const binaryString = atob(parts[1]);
                const bytes = new Uint8Array(binaryString.length);

                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                return new File([bytes], fileName, { type: mimeType });
            }

            async function shareCapturedPhoto() {
                if (!savedPhoto) {
                    showShareMessage('공유할 사진을 찾을 수 없어요. 카메라 권한을 확인해주세요.');
                    return;
                }

                if (!navigator.share) {
                    showShareMessage('이 브라우저에서는 바로 공유가 어려워요. 다운로드 버튼으로 저장한 뒤 공유해주세요.');
                    return;
                }

                const photoFile = dataUrlToFile(savedPhoto, 'awareness_memory.png');
                const shareData = {
                    title: '0awareness',
                    text: "Here's your 0awareness photo!",
                    files: [photoFile]
                };

                if (navigator.canShare && !navigator.canShare({ files: [photoFile] })) {
                    showShareMessage('이 브라우저에서는 사진 파일 공유가 지원되지 않아요. 다운로드 버튼으로 저장한 뒤 공유해주세요.');
                    return;
                }

                try {
                    await navigator.share(shareData);
                } catch (error) {
                    if (error.name !== 'AbortError') {
                        showShareMessage('공유창을 열 수 없어요. 다운로드 버튼으로 저장한 뒤 공유해주세요.');
                    }
                }
            }

            shareButton.addEventListener('click', shareCapturedPhoto);
        });
    </script>
</body>
</html>
