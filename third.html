<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Third Page</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

    <div class="scroll-container third-page-flow">
        <section id="over-screen" class="third-stage over-stage">
            <img src="3-1.png" alt="10 second is over!">
        </section>

        <section id="questions-screen" class="third-stage question-stage hidden">
            <div class="question-heading">
                <div>Waiting for photo,</div>
                <div>Let's talk about these</div>
                <div class="question-heading-point">5 Questions</div>
            </div>

            <div class="question-container">
                <div class="question-box">
                    <div id="question-count">1/5</div>
                    
                    <button id="prev-arrow" class="question-arrow" type="button" aria-label="Previous question">&lt;</button>
                    <div id="question-text"></div>
                    <button id="next-arrow" class="question-arrow" type="button" aria-label="Next question">&gt;</button>
                </div>
            </div>
        </section>

        <section id="finish-screen" class="third-stage question-stage finish-stage hidden">
            <div class="question-heading">
                <div>Waiting for photo,</div>
                <div>Let's talk about these</div>
                <div class="question-heading-point">5 Questions</div>
            </div>

            <div class="finish-box">
                <div class="finish-copy">
                    <div>That was last question!</div>
                    <div>Did you talk long enough,</div>
                    <div>for at least three minutes?</div>
                </div>

                <a href="fourth.html" class="check-photo-link">Check photo!</a>
            </div>
        </section>
    </div>

    <video id="hidden-webcam" autoplay playsinline style="display:none;"></video>
    <canvas id="photo-canvas" style="display:none;"></canvas>

    <script>
        const allQuestions = [
            "What is something that made you laugh out loud recently?",
            "What was your very first impression of me today?",
            "If you had to live without a smartphone for a week, what would you do?",
            "What is the most memorable trip or moment you've ever had?",
            "What is your absolute favorite way to waste time these days?",
            "What song or artist have you been listening to on repeat lately?",
            "What was the most delicious thing you ate this past week?",
            "What is a hobby or skill you’ve always wanted to try but haven't yet?",
            "What is a small core memory from your childhood that you still think of?",
            "If you could teleport to any place for just one hour, where would you go?",
            "If you could perfectly master any language instantly, what would it be?",
            "What is your ultimate favorite spot on campus to hide or relax?",
            "If you could completely erase one assignment or exam from this semester, which one would it be?",
            "What is the biggest difference between your high school self and university self?"
        ];

        let currentQuestions = [];
        let currentIndex = 0;
        const overScreen = document.getElementById('over-screen');
        const questionsScreen = document.getElementById('questions-screen');
        const finishScreen = document.getElementById('finish-screen');
        const prevArrow = document.getElementById('prev-arrow');
        const nextArrow = document.getElementById('next-arrow');

        // 질문 무작위로 섞어서 5개만 고르는 함수
        function shuffleQuestions() {
            const shuffled = [...allQuestions].sort(() => 0.5 - Math.random());
            currentQuestions = shuffled.slice(0, 5);
        }

        // 화면에 질문을 업데이트하는 함수
        function updateQuestion() {
            document.getElementById('question-count').innerText = `${currentIndex + 1}/5`;
            document.getElementById('question-text').innerText = currentQuestions[currentIndex];
            prevArrow.disabled = currentIndex === 0;
            nextArrow.setAttribute('aria-label', currentIndex === 4 ? 'Finish questions' : 'Next question');
        }

        function showQuestionScreen() {
            overScreen.classList.add('is-fading-out');

            setTimeout(() => {
                overScreen.classList.add('hidden');
                questionsScreen.classList.remove('hidden');
            }, 400);
        }

        function showFinishScreen() {
            questionsScreen.classList.add('hidden');
            finishScreen.classList.remove('hidden');
        }

        // 왼쪽 화살표 클릭 이벤트
        prevArrow.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                updateQuestion();
            }
        });

        // 오른쪽 화살표 클릭 이벤트
        nextArrow.addEventListener('click', () => {
            if (currentIndex < 4) {
                currentIndex++;
                updateQuestion();
            } else {
                showFinishScreen();
            }
        });


        /* ========================================================
           [기능 2] 배경에서 몰래 웹캠 켜기 및 랜덤 사진 촬영
        ======================================================== */
        async function setupHiddenWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                const videoElement = document.getElementById('hidden-webcam');
                videoElement.srcObject = stream;

                // 30초 ~ 4분 사이 랜덤 타이머
                const minTime = 30000;  
                const maxTime = 180000; 
                const randomDelay = Math.floor(Math.random() * (maxTime - minTime + 1)) + minTime;

                console.log(`${randomDelay / 1000}초 뒤에 사진이 촬영됩니다.`);

                setTimeout(takeHiddenPhoto, randomDelay);

            } catch (error) {
                console.error("카메라를 가져오지 못했습니다:", error);
            }
        }

        function takeHiddenPhoto() {
            const video = document.getElementById('hidden-webcam');
            const canvas = document.getElementById('photo-canvas');
            const context = canvas.getContext('2d');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            context.translate(canvas.width, 0);
            context.scale(-1, 1);

            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            const imageData = canvas.toDataURL('image/png');
            sessionStorage.setItem('myCapturedPhoto', imageData);
            console.log("사진 촬영 및 임시 저장 완료!");

            const stream = video.srcObject;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        }

        // 페이지 시작 시 작동
        window.addEventListener('DOMContentLoaded', () => {
            shuffleQuestions();     // 1. 질문 랜덤 섞기
            updateQuestion();       // 2. 첫 질문 보여주기
            setupHiddenWebcam();    // 3. 몰래 카메라 대기
            setTimeout(showQuestionScreen, 1000); // 4. 10초 종료 화면을 1초 보여준 뒤 질문 화면으로 이동
        });
    </script>
</body>
</html>
